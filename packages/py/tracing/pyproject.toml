[project]
name = "uselemma-tracing"
version = "4.0.1"
description = "HTTP tracing SDK for Lemma"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
keywords = ["tracing", "observability", "monitoring", "llm", "sdk"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["src/uselemma_tracing"]
omit = []

[project.urls]
Homepage = "https://github.com/uselemma/tracing"
Repository = "https://github.com/uselemma/tracing"
Issues = "https://github.com/uselemma/tracing/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/uselemma_tracing"]

[tool.hatch.build.targets.sdist]
include = ["src/", "LICENSE", "README.md"]
